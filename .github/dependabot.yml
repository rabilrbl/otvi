    target-branch: "dev"
    schedule:
      interval: "weekly"

  - package-ecosystem: "bun"
    directory: "/web"
    target-branch: "dev"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"

  - package-ecosystem: "bun"
    directory: "/docs"
    target-branch: "dev"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
