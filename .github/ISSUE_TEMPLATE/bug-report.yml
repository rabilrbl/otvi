name: Bug report
description: Report a reproducible defect in OTVI.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug report. Please include enough detail for reproduction.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How do we reproduce it?
      description: Include steps, sample config, or requests if applicable.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: server-v0.1.0, 0.1.0, or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, database, browser, provider config details, and anything else relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: text
