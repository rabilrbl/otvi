name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; additional runs will queue and execute sequentially.
# Do NOT cancel in-progress runs, as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./docs
        run: bun install --frozen-lockfile

      - name: Typecheck documentation site
        working-directory: ./docs
        run: bun run typecheck

      - name: Build documentation
        working-directory: ./docs
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/build

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
