name: Release otvi-server

on:
  push:
    tags:
      - v*.*.*
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build server binaries
    runs-on: ${{ matrix.os }}
    outputs:
      bundled-artifacts: ${{ steps.artifacts.outputs.bundled }}
      server-only-artifacts: ${{ steps.artifacts.outputs.server-only }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x86_64, aarch64]
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'pre-release' }}
      IS_TAG_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Determine Rust target
        id: rust_target
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "target=${{ matrix.arch }}-unknown-linux-gnu" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "target=${{ matrix.arch }}-apple-darwin" >> $GITHUB_OUTPUT
          else
            echo "target=${{ matrix.arch }}-pc-windows-msvc" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ steps.rust_target.outputs.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate release metadata
        if: env.IS_TAG_RELEASE == 'true'
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          tag = os.environ['RELEASE_TAG']
          prefix = 'v'
          if not tag.startswith(prefix):
              raise SystemExit(f'Tag must start with {prefix}: {tag}')
          version = tag[len(prefix):]
          parts = version.split('.')
          if len(parts) != 3 or any(not part.isdigit() for part in parts):
              raise SystemExit(f'Tag must use vX.Y.Z semantic versioning: {tag}')

          manifests = {
              'otvi-core': 'crates/otvi-core/Cargo.toml',
              'otvi-server': 'crates/otvi-server/Cargo.toml',
              'otvi-web': 'web/Cargo.toml',
          }
          for package, manifest_path in manifests.items():
              manifest = tomllib.loads(pathlib.Path(manifest_path).read_text())
              package_version = manifest['package']['version']
              if package_version != version:
                  raise SystemExit(f'{package} version {package_version} does not match tag {version}')

          versions = json.loads(pathlib.Path('docs/versions.json').read_text())
          if not versions or versions[0] != version:
              found = versions[0] if versions else 'missing'
              raise SystemExit(f'docs/versions.json must promote {version} as latest release, found {found}')

          docs_snapshot = pathlib.Path(f'docs/versioned_docs/version-{version}')
          sidebar_snapshot = pathlib.Path(f'docs/versioned_sidebars/version-{version}-sidebars.json')
          if not docs_snapshot.exists():
              raise SystemExit(f'Missing docs snapshot: {docs_snapshot}')
          if not sidebar_snapshot.exists():
              raise SystemExit(f'Missing sidebar snapshot: {sidebar_snapshot}')
          PY

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install AArch64 cross-compiler (Linux only)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build bundled frontend assets
        working-directory: web
        run: trunk build --release

      - name: Build bundled release binary
        env:
          OTVI_EMBED_FRONTEND: "1"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release -p otvi-server --target ${{ steps.rust_target.outputs.target }} --target-dir target/release-bundled
      - name: Build server-only release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release -p otvi-server --target ${{ steps.rust_target.outputs.target }} --target-dir target/release-server-only

      - name: Determine OS string
        id: os_string
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "os=linux" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "os=macos" >> $GITHUB_OUTPUT
          else
            echo "os=windows" >> $GITHUB_OUTPUT
          fi

      - name: Get commit SHA
        id: commit_sha
        shell: bash
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Package release assets
        id: artifacts
        shell: bash
        run: |
           if [[ "$IS_TAG_RELEASE" == "true" ]]; then
             VERSION="${RELEASE_TAG#v}"
           else
             VERSION="pre-release"
           fi
           COMMIT_SHA="${{ steps.commit_sha.outputs.sha }}"
           OS="${{ steps.os_string.outputs.os }}"
           ARCH="${{ matrix.arch }}"

           FULL_DIR="release/otvi-${VERSION}-${OS}-${ARCH}"
           API_DIR="release/otvi-server-${VERSION}-${OS}-${ARCH}"

           mkdir -p "$FULL_DIR" "$API_DIR"

           # Copy binaries - handle Windows .exe extension
           if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
             cp target/release-bundled/${{ steps.rust_target.outputs.target }}/release/otvi-server.exe "$FULL_DIR/otvi.exe"
             cp target/release-server-only/${{ steps.rust_target.outputs.target }}/release/otvi-server.exe "$API_DIR/otvi-server.exe"
           else
             cp target/release-bundled/${{ steps.rust_target.outputs.target }}/release/otvi-server "$FULL_DIR/otvi"
             cp target/release-server-only/${{ steps.rust_target.outputs.target }}/release/otvi-server "$API_DIR/otvi-server"
           fi

           cp README.md LICENSE "$FULL_DIR/"
           cp README.md LICENSE "$API_DIR/"

           # For pre-releases, add version info file with commit SHA
           if [[ "$IS_TAG_RELEASE" != "true" ]]; then
             echo "Pre-release build from commit: ${COMMIT_SHA}" > "$FULL_DIR/VERSION.txt"
             echo "Pre-release build from commit: ${COMMIT_SHA}" > "$API_DIR/VERSION.txt"
             echo "Branch: main" >> "$FULL_DIR/VERSION.txt"
             echo "Branch: main" >> "$API_DIR/VERSION.txt"
             echo "Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$FULL_DIR/VERSION.txt"
             echo "Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$API_DIR/VERSION.txt"
           fi

           tar -C release -czf "otvi-${VERSION}-${OS}-${ARCH}.tar.gz" "otvi-${VERSION}-${OS}-${ARCH}"
           tar -C release -czf "otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz" "otvi-server-${VERSION}-${OS}-${ARCH}"

           sha256sum "otvi-${VERSION}-${OS}-${ARCH}.tar.gz" > "otvi-${VERSION}-${OS}-${ARCH}.tar.gz.sha256"
           sha256sum "otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz" > "otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz.sha256"

           echo "bundled=$(ls otvi-${VERSION}-${OS}-${ARCH}.tar.gz otvi-${VERSION}-${OS}-${ARCH}.tar.gz.sha256 | tr '\n' ' ')" >> $GITHUB_OUTPUT
           echo "server-only=$(ls otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz.sha256 | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ steps.os_string.outputs.os }}-${{ matrix.arch }}
          path: |
            otvi-*.tar.gz
            otvi-*.tar.gz.sha256
            otvi-server-*.tar.gz
            otvi-server-*.tar.gz.sha256
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IS_TAG_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Get commit SHA
        id: commit_sha
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete existing pre-release
        if: env.IS_TAG_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the pre-release tag and release if it exists
          gh release delete pre-release --yes || true
          git push origin :refs/tags/pre-release || true

      - name: Create pre-release tag
        if: env.IS_TAG_RELEASE != 'true'
        run: |
          git tag -f pre-release
          git push -f origin pre-release

      - name: Create or update pre-release
        if: env.IS_TAG_RELEASE != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          name: "Pre-release (main branch)"
          prerelease: true
          body: |
            ## Pre-release Build from main branch

            **Commit:** ${{ github.sha }}
            **Short SHA:** ${{ steps.commit_sha.outputs.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            This is an automated pre-release build from the main branch. It contains the latest changes and may be unstable.

            ### Downloads

            Choose the appropriate binary for your platform:

            - **otvi-pre-release-{os}-{arch}.tar.gz**: Full binary with embedded frontend
            - **otvi-server-pre-release-{os}-{arch}.tar.gz**: Server-only binary without frontend

            Each archive includes a `VERSION.txt` file with build information.

            ### Verification

            Verify downloads using the provided SHA256 checksums:
            ```bash
            sha256sum -c otvi-pre-release-{os}-{arch}.tar.gz.sha256
            ```

            ---

            **Note:** For stable releases, use the [tagged releases](https://github.com/${{ github.repository }}/releases) instead.
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.tar.gz.sha256

      - name: Create release
        if: env.IS_TAG_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.tar.gz.sha256
