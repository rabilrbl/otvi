name: Release otvi-server

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build server binaries
    runs-on: ${{ matrix.os }}
    outputs:
      bundled-artifacts: ${{ steps.artifacts.outputs.bundled }}
      server-only-artifacts: ${{ steps.artifacts.outputs.server-only }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x86_64, aarch64]
        exclude:
          # Exclude unsupported combinations
          - os: windows-latest
            arch: aarch64
          - os: macos-latest
            arch: aarch64
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-apple-darwin
            aarch64-apple-darwin
            x86_64-pc-windows-msvc
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate release metadata
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          tag = os.environ['RELEASE_TAG']
          prefix = 'v'
          if not tag.startswith(prefix):
              raise SystemExit(f'Tag must start with {prefix}: {tag}')
          version = tag[len(prefix):]
          parts = version.split('.')
          if len(parts) != 3 or any(not part.isdigit() for part in parts):
              raise SystemExit(f'Tag must use vX.Y.Z semantic versioning: {tag}')

          manifests = {
              'otvi-core': 'crates/otvi-core/Cargo.toml',
              'otvi-server': 'crates/otvi-server/Cargo.toml',
              'otvi-web': 'web/Cargo.toml',
          }
          for package, manifest_path in manifests.items():
              manifest = tomllib.loads(pathlib.Path(manifest_path).read_text())
              package_version = manifest['package']['version']
              if package_version != version:
                  raise SystemExit(f'{package} version {package_version} does not match tag {version}')

          versions = json.loads(pathlib.Path('docs/versions.json').read_text())
          if not versions or versions[0] != version:
              found = versions[0] if versions else 'missing'
              raise SystemExit(f'docs/versions.json must promote {version} as latest release, found {found}')

          docs_snapshot = pathlib.Path(f'docs/versioned_docs/version-{version}')
          sidebar_snapshot = pathlib.Path(f'docs/versioned_sidebars/version-{version}-sidebars.json')
          if not docs_snapshot.exists():
              raise SystemExit(f'Missing docs snapshot: {docs_snapshot}')
          if not sidebar_snapshot.exists():
              raise SystemExit(f'Missing sidebar snapshot: {sidebar_snapshot}')
          PY

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build bundled frontend assets
        working-directory: web
        run: trunk build --release

      - name: Determine Rust target
        id: rust_target
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "target=${{ matrix.arch }}-unknown-linux-gnu" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "target=${{ matrix.arch }}-apple-darwin" >> $GITHUB_OUTPUT
          else
            echo "target=${{ matrix.arch }}-pc-windows-msvc" >> $GITHUB_OUTPUT
          fi
      - name: Build bundled release binary
        env:
          OTVI_EMBED_FRONTEND: "1"
        run: cargo build --locked --release -p otvi-server --target ${{ steps.rust_target.outputs.target }} --target-dir target/release-bundled
      - name: Build server-only release binary
        run: cargo build --locked --release -p otvi-server --target ${{ steps.rust_target.outputs.target }} --target-dir target/release-server-only

      - name: Determine OS string
        id: os_string
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "os=linux" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "os=macos" >> $GITHUB_OUTPUT
          else
            echo "os=windows" >> $GITHUB_OUTPUT
          fi
      - name: Package release assets
        id: artifacts
        run: |
           VERSION="${RELEASE_TAG#v}"
           OS="${{ steps.os_string.outputs.os }}"
           ARCH="${{ matrix.arch }}"

           FULL_DIR="release/otvi-${VERSION}-${OS}-${ARCH}"
           API_DIR="release/otvi-server-${VERSION}-${OS}-${ARCH}"

           mkdir -p "$FULL_DIR" "$API_DIR"

           cp target/release-bundled/release/otvi-server "$FULL_DIR/otvi"
           cp target/release-server-only/release/otvi-server "$API_DIR/otvi-server"
           cp README.md LICENSE RELEASING.md "$FULL_DIR/"
           cp README.md LICENSE RELEASING.md "$API_DIR/"

           tar -C release -czf "otvi-${VERSION}-${OS}-${ARCH}.tar.gz" "otvi-${VERSION}-${OS}-${ARCH}"
           tar -C release -czf "otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz" "otvi-server-${VERSION}-${OS}-${ARCH}"

           sha256sum "otvi-${VERSION}-${OS}-${ARCH}.tar.gz" > "otvi-${VERSION}-${OS}-${ARCH}.tar.gz.sha256"
           sha256sum "otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz" > "otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz.sha256"

           echo "bundled=$(ls release/otvi-${VERSION}-${OS}-${ARCH}.tar.gz release/otvi-${VERSION}-${OS}-${ARCH}.tar.gz.sha256 | tr '\n' ' ')" >> $GITHUB_OUTPUT
           echo "server-only=$(ls release/otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz release/otvi-server-${VERSION}-${OS}-${ARCH}.tar.gz.sha256 | tr '\n' ' ')" >> $GITHUB_OUTPUT

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/**/otvi-*-*.tar.gz
            release-artifacts/**/otvi-*-*.tar.gz.sha256
            release-artifacts/**/otvi-server-*-*.tar.gz
            release-artifacts/**/otvi-server-*-*.tar.gz.sha256
