# ─────────────────────────────────────────────────────────────────────────────
# httpbin – Example OTVI Provider Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# This example provider uses httpbin (https://httpbin.org) as the backend API.
# httpbin echoes requests back, making it ideal for testing and demonstration.
#
# It works out of the box against the public https://httpbin.org service.
# For local Docker testing, the integration tests read the HTTPBIN_URL
# environment variable and replace the base_url at runtime.
#
# How to create your own provider YAML:
#
# 1. Open your TV provider's mobile app and capture network traffic with
#    mitmproxy, Charles Proxy, or HTTP Toolkit.
# 2. Identify the login, channel listing, and stream playback API calls.
# 3. Copy this file, rename it, and replace the URLs, headers, and body
#    templates with the values from your captures.
# 4. Template variables:
#      {{input.X}}    – user-entered form values (email, password, otp, …)
#      {{stored.X}}   – values extracted from earlier API responses
#      {{extract.X}}  – values extracted from the previous auth step
#      {{uuid}}       – auto-generated UUID
# 5. JSONPath-like dot notation is used for response extraction:
#      $.data.token   – navigates into {"data": {"token": "…"}}
# ─────────────────────────────────────────────────────────────────────────────

provider:
  name: "httpbin"
  id: "httpbin"
  logo: "https://httpbin.org/image/png"

# Default HTTP settings applied to every outbound request.
defaults:
  base_url: "https://httpbin.org"
  headers:
    User-Agent: "OTVI-Example/1.0"
    Accept: "application/json"

# ── Authentication ──────────────────────────────────────────────────────────

auth:
  scope: global
  flows:
    # ── Simple login ──
    - id: "simple"
      name: "Username & Password"
      inputs:
        - key: "username"
          label: "Username"
          type: "text"
          required: true
        - key: "password"
          label: "Password"
          type: "password"
          required: true
      steps:
        - name: "Sign In"
          request:
            method: "POST"
            path: "/post"
            body: |
              {"username":"{{input.username}}","password":"{{input.password}}"}
          on_success:
            extract:
              # httpbin echoes the posted JSON under $.json
              access_token: "$.json.username"
              user_name: "$.json.username"

  # Logout endpoint (optional)
  logout:
    request:
      method: "POST"
      path: "/post"
      headers:
        Authorization: "Bearer {{stored.access_token}}"

# ── Channel Browsing ────────────────────────────────────────────────────────

channels:
  list:
    request:
      method: "GET"
      path: "/json"
    response:
      # httpbin /json returns {"slideshow": {"slides": [...]}}
      items_path: "$.slideshow.slides"
      mapping:
        id: "$.title"
        name: "$.title"

  # httpbin has no categories API, so we define static categories
  static_categories:
    - { id: "1", name: "Entertainment" }
    - { id: "2", name: "News" }
    - { id: "3", name: "Sports" }

# ── Stream Playback ─────────────────────────────────────────────────────────

playback:
  stream:
    request:
      method: "GET"
      path: "/get"
      params:
        channel_id: "{{input.channel_id}}"
    response:
      # httpbin /get echoes the full request URL under $.url
      url: "$.url"
      type: "hls"

    # ── Proxy configuration ───────────────────────────────────────────────────
    # The following fields control how the OTVI proxy forwards requests to the
    # upstream CDN on behalf of the browser.  All are optional.

    # Headers forwarded on every upstream proxy request.
    # Supports {{stored.*}} and {{input.*}} template variables.
    # proxy_headers:
    #   Authorization: "Bearer {{stored.access_token}}"
    #   User-Agent: "MyApp/1.0"

    # Maps a URL query-parameter name (from the stream/manifest URL) to a
    # cookie name.  Useful for Akamai-style CDNs that embed the auth token
    # as a query param in the manifest URL but expect it as a cookie on
    # segment and key-file requests.
    # Format: <url_param>: <cookie_name>
    # proxy_url_cookies:
    #   hdnea: "__hdnea__"

    # Static cookies sent verbatim on every upstream request.
    # Supports {{stored.*}} template variables.
    # proxy_cookies:
    #   ssotoken: "{{stored.sso_token}}"

    # When true, the raw query string from the first manifest URL is appended
    # to EXT-X-KEY URIs before fetching them upstream.  Set this when the key
    # server requires the manifest auth token as a URL param.
    # append_manifest_query_to_key_uris: false

    # When true, cookies extracted from the manifest URL via proxy_url_cookies
    # are NOT forwarded on AES-128 key requests.  Useful when the key server
    # lives on a different domain that rejects the CDN auth token.
    # key_exclude_resolved_cookies: false

    # Substring patterns (case-insensitive) limiting which EXT-X-KEY URIs
    # receive the manifest query append (requires
    # append_manifest_query_to_key_uris: true).  Empty = apply to all.
    # key_uri_patterns:
    #   - ".pkey"
    #   - "/keyserver/"
