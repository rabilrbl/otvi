schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
  Tech stack: Rust, Cargo, Axum backend, Leptos frontend with trunk and TailwindCSS
  SQLX with any preferred database (PostgreSQL, MySQL, SQLite)
  We use conventional commits
  Domain: Television Streaming Platform with multiple third party providers and user accounts.

  Prefer Cargo binstall for global tools, but allow cargo install for project-specific tools.

  Documentation of entire project is present at docs/. We use docusaurus with bun package manager.

  Core logic and few shared types are in crates/otvi-core/.
  Frontend code is at web/. Uses Leptos with trunk and TailwindCSS. 
  Backend code is at crates/otvi-server/. Uses Axum and SQLX.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
rules:
  specs:
    - Be explicit about mechanisms, not just outcomes (say HOW, not just WHAT)
    - If we generate artifacts, specify deletion/modification by explicit list lookup, not pattern matching
  proposal:
    - Refer to existing standards and best practices rather than inventing new ones
  tasks:
    - Prioritize tasks that have clear, measurable outcomes
    - Break down large tasks into smaller, manageable subtasks
    - Focus on tasks that improve code quality, maintainability, and developer experience
    - Update documentation and tests as part of any code changes
    - Always run rustfmt and clippy on generated code
    - Always run unit tests on generated code
  design:
    - Document any platform-specific behavior or limitations
    - Use existing constants and lists - don't invent detection mechanisms
    - Prefer explicit lookups over pattern matching or regex
    - Use existing tools and libraries where possible, rather than building from scratch
    - Consider security implications of design choices, especially when dealing with user data and third-party integrations
